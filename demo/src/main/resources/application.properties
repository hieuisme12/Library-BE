spring.application.name=library-api

# MySQL (librarydb on port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/librarydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Workaround for JDBC metadata issues (e.g. MySQL/MariaDB variants where certain
# INFORMATION_SCHEMA columns differ). We pin the dialect and skip JDBC metadata
# access during bootstrap.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

server.port=8083

# JWT
# Must be >= 32 chars for HS256
# In production: set env var APP_JWT_SECRET (do not hard-code real secrets).
# In development: the fallback below is only to avoid startup failures.
app.jwt.secret=${APP_JWT_SECRET:dev-secret-change-this-please-32-chars-min!!!!}
app.jwt.access-token-seconds=900
app.jwt.refresh-token-seconds=1209600

# Invite code to create BOOK_KEEPER users via /api/auth/register-bookkeeper
# In production: set env var APP_BOOKKEEPER_INVITE_CODE.
app.security.bookkeeper-invite-code=${APP_BOOKKEEPER_INVITE_CODE:dev-invite-code-change-me}
