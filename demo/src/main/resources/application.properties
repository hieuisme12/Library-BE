spring.application.name=library-api

# MySQL (librarydb on port 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/librarydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT
# Must be >= 32 chars for HS256
app.jwt.secret=change-me-change-me-change-me-change-me-32chars-min
app.jwt.access-token-seconds=900
app.jwt.refresh-token-seconds=1209600

# Invite code to create BOOK_KEEPER users via /api/auth/register-bookkeeper
app.security.bookkeeper-invite-code=change-me
